<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/get2knowme_logo_svg.svg" />
    <link rel="icon" type="image/png" href="/get2knowme_logo_png.png" />
    <link rel="apple-touch-icon" href="/get2knowme_logo_png.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get2KnowMe</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preload" as="image" href="/get2knowme_logo_png.png" type="image/png" />
    <!-- Early theme setter: ensures color scheme is set before CSS loads -->
    <script>
      try {
        const scheme = localStorage.getItem('color-scheme');
        if (scheme) {
          document.documentElement.setAttribute('data-bs-theme', scheme);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
